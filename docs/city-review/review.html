    * { box-sizing: border-box; }

    }

      max-width: 920px;
      margin: 0;
      color: var(--muted);
      font-size: 17px;
    }
    main {
      padding: 0 clamp(14px, 3vw, 42px) 48px;
    }
    .toolbar, .result-panel, .section {
      background: rgba(255, 250, 240, 0.84);
      border: 1px solid rgba(170, 140, 103, 0.38);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }
    .toolbar {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      margin-bottom: 18px;
      position: sticky;
      top: 10px;
      z-index: 10;
      backdrop-filter: blur(14px);
    }
    .counts {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }
    button, .download {
      border: 1px solid rgba(48, 40, 30, 0.16);
      border-radius: 999px;
      background: #2d241a;
      color: #fffaf0;
      padding: 8px 13px;
      font: 700 13px/1.1 ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
      text-decoration: none;
    }
    button.secondary {
      background: #f6ead8;
      color: var(--ink);
    }
    button.danger {
      background: var(--danger);
    }
    button.add {
      background: var(--success);
      white-space: nowrap;
    }
    button.apply {
      background: #3f6f86;
      white-space: nowrap;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fffdf7;
      padding: 9px 10px;
      color: var(--ink);
      font: 700 15px/1.1 ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .section {
      padding: 18px;
      margin-top: 24px;
    }
    .section h2, .result-panel h2 {
      margin: 0 0 12px;
      font-size: 25px;
      letter-spacing: -0.025em;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }
    .card {
      background: var(--panel);
      border: 1px solid rgba(121, 93, 59, 0.28);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(66, 45, 22, 0.1);
    }
    .card.removed {
      opacity: 0.45;
      filter: grayscale(0.8);
    }
    .card.added {
      outline: 4px solid rgba(31, 122, 91, 0.22);
    }
    .card-top {
      display: grid;
      grid-template-columns: auto auto auto 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      font: 800 12px/1 ui-sans-serif, system-ui, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .pill {
      border-radius: 999px;
      padding: 6px 8px;
      background: #eadcc6;
      width: fit-content;
    }
    .pill.success { background: rgba(31, 122, 91, 0.16); color: var(--success); }
    .pill.candidate { background: rgba(161, 95, 19, 0.16); color: var(--candidate); }
    .thumb, .timer-crop {
      display: block;
      width: 100%;
      background: #211a14;
    }
    .timer-crop {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .card-body {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
      padding: 12px;
    }
    .detail {
      grid-column: 1 / -1;
      color: var(--muted);
      font: 13px/1.4 ui-sans-serif, system-ui, sans-serif;
      overflow-wrap: anywhere;
    }
    .result-panel {
      padding: 18px;
      margin-top: 24px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font: 14px/1.35 ui-sans-serif, system-ui, sans-serif;
    }
    th, td {
      padding: 9px 8px;
      border-bottom: 1px solid rgba(121, 93, 59, 0.22);
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
    }
    .empty {
      padding: 18px;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 16px;
    }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .toolbar { position: static; align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>

  <script>
    const initialData = JSON.parse(document.getElementById("review-data").textContent);
    const state = {
      removedSuccessIds: new Set(),
      addedCandidateIds: new Set(),
      candidateTimers: new Map(initialData.missing_candidates.map((item) => [item.id, item.timer || ""])),
      successTimerDrafts: new Map(),
      successTimerOverrides: new Map()
    };

    const successGrid = document.getElementById("successGrid");
    const candidateGrid = document.getElementById("candidateGrid");
    const finalTable = document.getElementById("finalTable");
    const counts = document.getElementById("counts");

    function render() {
      successGrid.innerHTML = "";
      candidateGrid.innerHTML = "";
      initialData.successes.forEach((item) => successGrid.appendChild(card(item)));
      initialData.missing_candidates.forEach((item) => candidateGrid.appendChild(card(item)));
      renderFinal();
      renderDownloads();
    }

    function card(item) {
      const element = document.createElement("article");
      const isSuccess = item.kind === "success";
      const removed = state.removedSuccessIds.has(item.id);
      const added = state.addedCandidateIds.has(item.id);
      element.className = `card ${removed ? "removed" : ""} ${added ? "added" : ""}`;

      const action = isSuccess
        ? `<button class="danger" data-action="toggle-remove" data-id="${item.id}">${removed ? "Restore" : "Remove"}</button>`
        : "";
      element.innerHTML = `
        <div class="card-top">
          <span class="pill">frame ${item.frame}</span>
          <span class="pill ${isSuccess ? "success" : "candidate"}">${isSuccess ? "SUCCESS" : "CANDIDATE"}</span>
          <span class="pill">${item.source || "unknown"}</span>
          <span></span>
          ${action}
        </div>
        ${imageTag(item.thumbnail, "thumb", `frame ${item.frame}`)}
        ${imageTag(item.timer_crop, "timer-crop", `timer crop ${item.frame}`)}
        <div class="card-body">
          ${timerControl(item)}
          <div class="detail">${detailText(item)}</div>
        </div>
      `;
      element.addEventListener("click", onCardClick);
      element.addEventListener("input", onCardInput);
      return element;
    }

    function imageTag(src, className, alt) {
      if (!src) return `<div class="${className} empty">image missing</div>`;
      return `<img class="${className}" src="${src}" alt="${alt}" loading="lazy">`;
    }

    function timerControl(item) {
      if (item.kind === "success") {
        const value = state.successTimerDrafts.has(item.id)
          ? state.successTimerDrafts.get(item.id)
          : currentSuccessTimer(item);
        return `
          <input data-action="success-timer" data-id="${item.id}" value="${escapeHtml(value || "")}" placeholder="timer e.g. 0:22:38.096">
          <button class="apply" data-action="apply-success-timer" data-id="${item.id}">Apply</button>
        `;
      }
      const value = state.candidateTimers.get(item.id) || "";
      const added = state.addedCandidateIds.has(item.id);
      return `
        <input data-action="candidate-timer" data-id="${item.id}" value="${escapeHtml(value)}" placeholder="manual timer e.g. 0:22:38.096">
        <button class="add" data-action="toggle-add" data-id="${item.id}">${added ? "Remove" : "Add"}</button>
      `;
    }

    function detailText(item) {
      if (item.kind === "success") {
        return `timer_source_frame=${item.timer_source_frame ?? ""} audio=${item.audio_time_seconds || "-"} score=${item.audio_score || "-"}`;
      }
      return `decision=${item.decision || "-"} raw=${item.timer_raw || "-"} read=${item.read_status || "-"} rate=${item.computed_rate || "-"}`;
    }

    function onCardClick(event) {
      const button = event.target.closest("button");
      if (!button) return;
      const id = button.dataset.id;
      if (button.dataset.action === "toggle-remove") {
        toggleSet(state.removedSuccessIds, id);
      }
      if (button.dataset.action === "toggle-add") {
        toggleSet(state.addedCandidateIds, id);
      }
      if (button.dataset.action === "apply-success-timer") {
        const item = initialData.successes.find((success) => success.id === id);
        const fallback = item ? currentSuccessTimer(item) : "";
        state.successTimerOverrides.set(id, state.successTimerDrafts.get(id) ?? fallback);
      }
      render();
    }

    function onCardInput(event) {
      if (event.target.dataset.action === "candidate-timer") {
        state.candidateTimers.set(event.target.dataset.id, event.target.value);
      }
      if (event.target.dataset.action === "success-timer") {
        state.successTimerDrafts.set(event.target.dataset.id, event.target.value);
      }
      renderFinal();
      renderDownloads();
    }

    function toggleSet(set, id) {
      if (set.has(id)) set.delete(id);
      else set.add(id);
    }

    function finalBoundaries() {
      const keptSuccesses = initialData.successes
        .filter((item) => !state.removedSuccessIds.has(item.id))
        .map((item) => ({ frame: item.frame, source: item.source, kind: "success", timer: currentSuccessTimer(item) }));
      const addedCandidates = initialData.missing_candidates
        .filter((item) => state.addedCandidateIds.has(item.id))
        .map((item) => ({ frame: item.frame, source: item.source, kind: "candidate", timer: state.candidateTimers.get(item.id) || "" }));
      return keptSuccesses.concat(addedCandidates).sort((a, b) => a.frame - b.frame);
    }

    function currentSuccessTimer(item) {
      return state.successTimerOverrides.get(item.id) ?? item.timer ?? "";
    }

    function finalRows() {
      return finalBoundaries().map((row, index, rows) => {
        const previous = rows[index - 1] || null;
        const durationSeconds = previous ? timerDeltaSeconds(previous.timer, row.timer) : null;
        return {
          ...row,
          index: index + 1,
          previous_frame: previous ? previous.frame : "",
          previous_timer: previous ? previous.timer : "",
          duration_sec: durationSeconds === null ? "" : durationSeconds.toFixed(3)
        };
      });
    }

    function renderFinal() {
      const rows = finalRows();
      counts.innerHTML = `
        <span>success kept: <strong>${initialData.successes.length - state.removedSuccessIds.size}</strong> / ${initialData.successes.length}</span>
        <span>candidate added: <strong>${state.addedCandidateIds.size}</strong> / ${initialData.missing_candidates.length}</span>
        <span>final boundaries: <strong>${rows.length}</strong></span>
      `;
      if (!rows.length) {
        finalTable.innerHTML = `<div class="empty">No boundary selected.</div>`;
        return;
      }
      const intervalRows = rows.map((row, index) => {
        return `<tr>
          <td>${row.index}</td>
          <td><code>${row.frame}</code></td>
          <td>${row.kind}</td>
          <td>${row.source || ""}</td>
          <td><code>${escapeHtml(row.timer)}</code></td>
          <td>${row.previous_timer ? `<code>${escapeHtml(row.previous_timer)} -> ${escapeHtml(row.timer)}</code>` : ""}</td>
          <td><code>${row.duration_sec}</code></td>
        </tr>`;
      }).join("");
      finalTable.innerHTML = `
        <table>
          <thead><tr><th>#</th><th>Frame</th><th>Kind</th><th>Source</th><th>Timer</th><th>Interval</th><th>Duration Sec</th></tr></thead>
          <tbody>${intervalRows}</tbody>
        </table>
      `;
    }

    function renderDownloads() {
      const rows = finalRows();
      const csv = ["index,frame,kind,source,timer,previous_frame,previous_timer,duration_sec"].concat(rows.map((row) => [
        row.index,
        row.frame,
        row.kind,
        row.source || "",
        row.timer || "",
        row.previous_frame,
        row.previous_timer,
        row.duration_sec
      ].map(csvCell).join(","))).join("\n");
      setDownload("downloadCsv", new Blob([csv], { type: "text/csv" }), "review-boundaries.csv");
    }

    function setDownload(id, blob, filename) {
      const link = document.getElementById(id);
      if (link.dataset.url) URL.revokeObjectURL(link.dataset.url);
      const url = URL.createObjectURL(blob);
      link.dataset.url = url;
      link.href = url;
      link.download = filename;
    }

    function parseTimer(value) {
      const text = String(value || "").trim();
      if (!text) return null;
      const parts = text.split(":");
      const seconds = Number(parts.pop());
      if (!Number.isFinite(seconds)) return null;
      let total = seconds;
      if (parts.length >= 1) total += Number(parts.pop()) * 60;
      if (parts.length >= 1) total += Number(parts.pop()) * 3600;
      return Number.isFinite(total) ? total : null;
    }

    function timerDeltaSeconds(fromValue, toValue) {
      const from = parseTimer(fromValue);
      const to = parseTimer(toValue);
      if (from === null || to === null) return null;
      return to - from;
    }

    function csvCell(value) {
      const text = String(value ?? "");
      return /[",\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    document.getElementById("resetBtn").addEventListener("click", () => {
      state.removedSuccessIds.clear();
      state.addedCandidateIds.clear();
      state.candidateTimers = new Map(initialData.missing_candidates.map((item) => [item.id, item.timer || ""]));
      state.successTimerDrafts.clear();
      state.successTimerOverrides.clear();
      render();
    });

    render();
  </script>
</body>
